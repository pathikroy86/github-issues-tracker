<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!--Geist Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--Tailwind & Daisy CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--External CSS link-->
    <link rel="stylesheet" href="styles/style.css">

    <!--Font awesome-->
    <script src="https://kit.fontawesome.com/bbfa251da8.js" crossorigin="anonymous"></script>
</head>

<body>
    <!--Navbar-->
    <div class="navbar bg-base-100 shadow-sm mb-10">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <label tabindex="-1"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
            </div>
            <a class="btn btn-ghost text-xl"><i class="fa-brands fa-github"></i> <span
                    class="text-base md:text-2xl font-semibold">GitHub Issues Tracker</span></a>
        </div>
        <div class="navbar-end space-x-3">
            <label class="menu input hidden md:flex items-center">
                <input type="search" required placeholder="Search" />
            </label>
            <a class="btn btn-primary">Search</a>
        </div>
    </div>
    <!--Navbar-->

    <div class="w-11/12 md:w-10/12 mx-auto mb-10">
        <button id="all-btn" class="btn btn-success" onclick="handleActiveBtn('all-btn')">All</button>
        <button id="open-btn" class="btn" onclick="handleActiveBtn('open-btn')">Open</button>
        <button id="closed-btn" class="btn" onclick="handleActiveBtn('closed-btn')">Closed</button>
    </div>
    <div class="w-11/12 md:w-10/12 mx-auto flex justify-between items-center pb-2 border-b border-b-slate-200 mb-5">
        <div class="flex gap-2">
            <div class="flex items-center bg-[#ECE4FF] p-1 rounded-full"><img src="assets/Aperture.png" alt=""></div>
            <div>
                <h4 class="text-xl font-semibold"><span id="issue-counter">50</span> Issues</h4>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div aria-label="success" class="status status-success">

            </div> Open
            <div aria-label="status" class="status status-primary"></div> Closed
        </div>
    </div>
    <!--Card Container-->
    <div id="spinner" class="flex justify-center my-10 hidden">
        <span class="loading loading-bars loading-lg"></span>
    </div>
    <div onclick="my_modal_5.showModal()" id="card-container"
        class="w-11/12 md:w-10/12 mx-auto grid grid-cols-1 md:grid-cols-3 gap-3 lg:grid-cols-4">

    </div>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">

    </dialog>
</body>

<script src="js/utilities.js"></script>
<script src="js/home.js"></script>

</html>
