<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!--Geist Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--Tailwind & Daisy CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--External CSS link-->
    <link rel="stylesheet" href="styles/style.css">

</head>

<body class="flex justify-center items-center h-screen">
    <div class="bg-base-200 border-base-300 border rounded-box p-5">
        <div class="grid place-content-center">
            <div class="mx-auto">
                <img src="assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
            <fieldset class="fieldset mb-3">

                <label class="label">Username</label>
                <input id="username-field" type="text" class="input" placeholder="Enter Username" />

                <label class="label">Password</label>
                <input id="password-field" type="password" class="input" placeholder="Enter Password" />

                <button id="signin-btn" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
            <hr>
            <p class="text-[#64748B] my-5">Demo Credentials</p>
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin 123</p>
        </div>
    </div>
</body>

<script src="js/login.js"></script>

</html>
